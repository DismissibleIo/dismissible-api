# Redis cache enabled test config
# Note: Requires Redis to be running on localhost:6379

server:
  port: 3001

cors:
  enabled: false

helmet:
  enabled: false

swagger:
  enabled: false

storage:
  type: memory

cache:
  type: redis
  redis:
    url: redis://localhost:6379
    keyPrefix: 'test:'
    ttlMs: 60000

jwtAuth:
  enabled: false

rateLimiter:
  enabled: false

validation:
  disableErrorMessages: false
  whitelist: true
  forbidNonWhitelisted: true
  transform: true
