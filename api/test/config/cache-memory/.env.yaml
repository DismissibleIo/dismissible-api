# Memory cache enabled test config

server:
  port: 3001

cors:
  enabled: false

helmet:
  enabled: false

swagger:
  enabled: false

storage:
  type: memory

cache:
  type: memory
  memory:
    maxItems: 1000
    ttlMs: 60000

jwtAuth:
  enabled: false

rateLimiter:
  enabled: false

validation:
  disableErrorMessages: false
  whitelist: true
  forbidNonWhitelisted: true
  transform: true
